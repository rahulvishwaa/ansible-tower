apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp
  namespace: webapp
spec:
  replicas: 3                      # ReplicaSet maintains 3 pods
  selector:
    matchLabels:
      app: webapp
  template:
    metadata:
      labels:
        app: webapp
    spec:
      containers:
        - name: webapp
          image: nginx:alpine
          ports:
            - containerPort: 80
          envFrom:
            - configMapRef:
                name: webapp-config   # inject all ConfigMap keys
            - secretRef:
                name: webapp-secret   # inject all Secret keys
          resources:
            requests:              # minimum guaranteed resources
              cpu: "100m"
              memory: "64Mi"
            limits:                # maximum allowed resources
              cpu: "250m"
              memory: "128Mi"
