- name: Deploy webapp to Kubernetes
  hosts: all
  become: true
  vars:
    base_url: "https://raw.githubusercontent.com/rahulvishwaa/ansible-tower/main/k8s-webapp-demo/manifests"

  tasks:
    - name: Create namespace
      kubernetes.core.k8s:
        state: present
        src: "{{ base_url }}/00-namespace.yml"

    - name: Apply ConfigMap
      kubernetes.core.k8s:
        state: present
        src: "{{ base_url }}/01-configmap.yml"

    - name: Apply Secret
      kubernetes.core.k8s:
        state: present
        src: "{{ base_url }}/02-secret.yml"

    - name: Apply Deployment
      kubernetes.core.k8s:
        state: present
        src: "{{ base_url }}/03-deployment.yml"

    - name: Apply Service
      kubernetes.core.k8s:
        state: present
        src: "{{ base_url }}/04-service.yml"

    - name: Apply Ingress
      kubernetes.core.k8s:
        state: present
        src: "{{ base_url }}/05-ingress.yml"

    - name: Wait for deployment to be ready
      kubernetes.core.k8s_info:
        kind: Deployment
        name: webapp
        namespace: webapp
        wait: true
        wait_condition:
          type: Available
          status: "True"
        wait_timeout: 120

    - name: Show pod status
      kubernetes.core.k8s_info:
        kind: Pod
        namespace: webapp
        label_selectors:
          - app=webapp
      register: pod_info

    - name: Print pod names and status
      ansible.builtin.debug:
        msg: "{{ item.metadata.name }} → {{ item.status.phase }}"
      loop: "{{ pod_info.resources }}"
